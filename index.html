<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APTV Revive</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Montserrat',sans-serif;
    color:white;
    background:#0b0f1a;
}

/* LIQUID BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 20% 20%, #00e5ff33, transparent 40%),
        radial-gradient(circle at 80% 30%, #ff00ff22, transparent 40%),
        radial-gradient(circle at 40% 80%, #00ff8833, transparent 40%);
    filter:blur(60px);
    animation:moveGlow 18s linear infinite;
    z-index:-2;
}

@keyframes moveGlow {
    0% { transform:translate(0,0) rotate(0deg); }
    50% { transform:translate(-10%,10%) rotate(180deg); }
    100% { transform:translate(0,0) rotate(360deg); }
}

.container {
    width:380px;
    margin:20px auto;
    padding:18px;
    border-radius:20px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
}

/* BUTTONS */
.controls {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.controls button {
    flex:1;
    padding:6px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:white;
    font-weight:700;
    cursor:pointer;
}

/* GRID */
#channelGrid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin:10px 0;
}

.channel-card {
    padding:12px;
    border-radius:12px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
}

.live-badge {
    position:absolute;
    background:red;
    font-size:10px;
    padding:2px 5px;
}

/* PLAYER */
#player {
    width:100%;
    height:210px;
    border-radius:12px;
}

#status {
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📺 APTV Revive</h2>

<div class="controls">
<button onclick="jumpToChannel(2)">2</button>
<button onclick="jumpToChannel(3)">3</button>
<button onclick="jumpToChannel(4)">4</button>
<button onclick="jumpToChannel(5)">5</button>
<button onclick="jumpToChannel(7)">7</button>
<button onclick="jumpToChannel(8)">8</button>
<button onclick="jumpToChannel(12)">12</button>
<button onclick="jumpToChannel(30)">30</button>
<button onclick="jumpToChannel(31)">31</button>
<button onclick="jumpToChannel(32)">32</button>
</div>

<div id="channelGrid"></div>
<div id="status">NO SIGNAL</div>

<div id="player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

// UTIL
function getVideoId(url){
    try{
        const u=new URL(url);
        if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
        if(u.searchParams.get("v")) return u.searchParams.get("v");
        if(u.pathname.includes("/live/")) return u.pathname.split("/live/")[1];
    }catch{}
    return null;
}

// CHANNELS
const channels=[

{channel:2,name:"UNTV",playlist:["https://www.youtube.com/live/eDZR3ggrXBs"]},
{channel:3,name:"DZIO",playlist:["https://youtu.be/NC91hzXiL9Q"]},
{channel:4,name:"DZRH",playlist:["https://www.youtube.com/live/6Nyc4xIUraQ"]},
{channel:5,name:"PlayTV",playlist:[
"https://youtu.be/hTLqJSvNF3Q",
"https://youtu.be/44W2QIwaopA"
]},
{channel:7,name:"ABC7",playlist:["https://www.youtube.com/live/s3iVFJoxrYc"]},
{channel:8,name:"Al Jazeera",playlist:["https://www.youtube.com/live/gCNeDWCI0vo"]},
{channel:12,name:"NBC",playlist:["https://www.youtube.com/live/6W_J1wT3stE"]},

// NEW DISNEY CHANNELS
{channel:30,name:"Disney+ Miraculous",playlist:["https://www.youtube.com/live/WuS3O7AcciE"]},
{channel:31,name:"Disney+ Big City Greens",playlist:["https://www.youtube.com/live/B_5RPAixkG4"]},
{channel:32,name:"Disney+ Phineas & Ferb",playlist:["https://www.youtube.com/live/_HviSyC7zSU"]}

];

// STATE
let player,currentChannel=null,index=0,ready=false;
const grid=document.getElementById("channelGrid");
const status=document.getElementById("status");

// INIT
window.onYouTubeIframeAPIReady=function(){
player=new YT.Player("player",{
playerVars:{autoplay:1},
events:{
onReady:()=>{ready=true;buildUI();}
}});
};

// UI
function buildUI(){
channels.forEach(ch=>{
const div=document.createElement("div");
div.className="channel-card";
div.innerText=`CH ${ch.channel} - ${ch.name}`;
div.onclick=()=>jumpToChannel(ch.channel);
grid.appendChild(div);
});
}

// TELEPORT
function jumpToChannel(num){
const ch=channels.find(c=>c.channel===num);
if(!ch||!ready) return;

currentChannel=ch;
index=0;

player.stopVideo();
status.innerText="Switching...";

setTimeout(play,100);
}

// PLAY
function play(){
const id=getVideoId(currentChannel.playlist[index]);
player.loadVideoById(id);
status.innerText=currentChannel.name;
}

</script>

</body>
</html>
