function getVideoId(url){
try{
const clean = url.split("?")[0];
const u = new URL(clean);

if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
if(u.searchParams.get("v")) return u.searchParams.get("v");
if(u.pathname.includes("/live/")) return u.pathname.split("/live/")[1];

}catch{}
return null;
}

let player,currentChannel=null,index=0,ready=false;
let shuffleMode = true;
let shuffleOrders = {};
let shuffleIndex = 0;

function generateShuffleOrder(length){
let arr=[...Array(length).keys()];
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

window.onYouTubeIframeAPIReady=function(){
player=new YT.Player("player",{
playerVars:{autoplay:1},
events:{
onReady:()=>{ready=true;buildUI();},
onStateChange:onStateChange,
onError:onError
}});
};

function buildUI(){
const grid=document.getElementById("channelGrid");
grid.innerHTML="";
channels.forEach(ch=>{
const div=document.createElement("div");
div.className="channel-card";
div.innerText=`CH ${ch.channel} - ${ch.name}`;
div.onclick=()=>jumpToChannel(ch.channel);
grid.appendChild(div);
});
}

function play(){
if(!currentChannel) return;

const key=currentChannel.channel;
const list=currentChannel.playlist;

if(shuffleMode){
if(!shuffleOrders[key] || shuffleOrders[key].length !== list.length){
shuffleOrders[key]=generateShuffleOrder(list.length);
shuffleIndex=0;
}
}

let i = shuffleMode ? shuffleOrders[key][shuffleIndex] : index % list.length;

const id=getVideoId(list[i]);
if(!id){ next(); return; }

player.loadVideoById(id);

document.getElementById("status").innerText=
`CH ${currentChannel.channel} - ${currentChannel.name}`;
}

function next(){
if(!currentChannel) return;

if(shuffleMode){
const key=currentChannel.channel;
shuffleIndex++;

if(shuffleIndex>=shuffleOrders[key].length){
shuffleOrders[key]=generateShuffleOrder(currentChannel.playlist.length);
shuffleIndex=0;
}
}else index++;

play();
}

function jumpToChannel(num){
if(!ready) return;

const ch=channels.find(c=>c.channel===num);
if(!ch) return;

currentChannel=ch;
index=0;
shuffleIndex=0;

delete shuffleOrders[ch.channel];

document.getElementById("status").innerText="Switching...";

setTimeout(play,300);
}

function onStateChange(e){
if(e.data===YT.PlayerState.ENDED){
setTimeout(next,300);
}
}

function onError(e){
document.getElementById("status").innerText="Skipping...";
setTimeout(next,500);
}
